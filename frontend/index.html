<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AesthetiMap — Generate Beautiful Map Art</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="blob-bg">
      <div class="blob shape1"></div>
      <div class="blob shape2"></div>
      <div class="blob shape3"></div>
    </div>

    <div class="app-container">
      <header class="app-header" style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem;">
        <div>
          <h1>AesthetiMap</h1>
          <p>Create stunning, high-definition city maps magically.</p>
        </div>
        <div id="auth-state" style="font-size: 0.95rem; text-align: right; background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
           <span id="user-display" style="color: #a5b4fc; margin-right: 0.5rem;">Anonymous</span>
           <button type="button" id="login-nav-btn" class="btn-generate" style="padding: 0.4rem 1rem; font-size: 0.85rem; width: auto; display: inline-block;">Log In</button>
           <button type="button" id="logout-nav-btn" class="btn-download hidden" style="padding: 0.4rem 1rem; font-size: 0.85rem; width: auto; display: inline-block;">Log Out</button>
        </div>
      </header>

      <!-- Auth Modal -->
      <div id="auth-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 9999; display: flex; justify-content: center; align-items: center;">
        <div class="glass-panel" style="width: 400px; max-width: 90%; padding: 2rem;">
            <h2 id="auth-title" style="margin-bottom: 1.5rem; color: #e0e7ff;">Log In</h2>
            <form id="auth-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="email" id="auth-email" placeholder="Email" required style="padding: 0.85rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; width: 100%; box-sizing: border-box;">
                <input type="password" id="auth-password" placeholder="Password" required style="padding: 0.85rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; width: 100%; box-sizing: border-box;">
                <p id="auth-error" style="color: #ef4444; font-size: 0.85rem; margin: 0; min-height: 1.2em;"></p>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                   <button type="button" id="auth-switch-btn" style="background: none; border: none; color: #818cf8; cursor: pointer; font-size: 0.85rem; padding: 0;">Need an account? Register</button>
                   <div style="display: flex; gap: 0.5rem; align-items: center;">
                       <button type="button" id="auth-cancel-btn" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 0.6rem 1.25rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; font-family: inherit; margin: 0; display: inline-flex; justify-content: center; align-items: center; box-sizing: border-box; transition: background 0.2s;">Cancel</button>
                       <button type="submit" id="auth-submit-btn" class="btn-generate" style="padding: 0.6rem 1.25rem; width: auto; font-size: 0.9rem; border-radius: 8px; margin: 0; display: inline-flex; justify-content: center; align-items: center; box-sizing: border-box;">Submit</button>
                   </div>
             <div style="display: flex; align-items: center; text-align: center; margin: 1.5rem 0 1rem 0;">
                <div style="flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1);"></div>
                <span style="padding: 0 1rem; color: #9ca3af; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">or continue with</span>
                <div style="flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1);"></div>
             </div>
             
             <div style="display: flex; gap: 0.75rem; flex-direction: column;">
                 <a href="/api/auth/login/google" style="display: flex; align-items: center; justify-content: center; gap: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0.75rem; border-radius: 8px; font-weight: 500; font-size: 0.95rem; text-decoration: none; transition: background 0.2s;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                 </a>
                 <a href="/api/auth/login/github" style="display: flex; align-items: center; justify-content: center; gap: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0.75rem; border-radius: 8px; font-weight: 500; font-size: 0.95rem; text-decoration: none; transition: background 0.2s;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/>
                    </svg>
                    GitHub
                 </a>
             </div>
        </div>
      </div>

      <div class="main-content">
        <!-- Configuration Panel -->
        <div class="glass-panel config-panel">
          <form id="generate-form">
            <h2 class="panel-title">Configuration</h2>

            <div class="form-group row">
              <div class="input-col position-relative autocomplete-wrapper">
                <label for="city">City Name *</label>
                <input type="text" id="city" placeholder="e.g. Paris" autocomplete="off" required>
                <div id="autocomplete-list" class="autocomplete-items hidden"></div>
              </div>
              <div class="input-col">
                <label for="country">Country *</label>
                <input type="text" id="country" placeholder="e.g. France" required>
              </div>
            </div>

            <div class="form-group">
              <label for="theme">Aesthetic Theme</label>
              <div class="select-wrapper">
                <select id="theme">
                  <option value="terracotta">Loading themes...</option>
                </select>
              </div>
            </div>

            <div class="form-group row">
              <div class="input-col">
                <label for="latitude">Latitude (optional)</label>
                <input type="text" id="latitude" placeholder="e.g. 48.8566">
              </div>
              <div class="input-col">
                <label for="longitude">Longitude (optional)</label>
                <input type="text" id="longitude" placeholder="e.g. 2.3522">
              </div>
            </div>

            <div class="form-group">
              <label for="span">Map Coverage (m): <span id="span-val">20000</span> m</label>
              <input type="range" id="span" min="500" max="80000" step="500" value="20000">
            </div>

            <div class="form-group row">
              <div class="input-col">
                <label for="width">Width (in)</label>
                <input type="number" id="width" value="12" step="0.5" max="40">
              </div>
              <div class="input-col">
                <label for="height">Height (in)</label>
                <input type="number" id="height" value="16" step="0.5" max="40">
              </div>
            </div>

            <div class="form-group">
              <label for="format">Export Format</label>
              <div class="select-wrapper">
                <select id="format">
                  <option value="png">PNG (High Res)</option>
                  <option value="svg">SVG (Vector)</option>
                  <option value="pdf">PDF (Print)</option>
                </select>
              </div>
            </div>

            <div class="form-group" style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; margin-bottom: 1.5rem;">
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="no-title" style="width: auto; margin: 0;">
                <label for="no-title" style="margin: 0; color: var(--text-secondary); cursor: pointer; text-transform: none; font-weight: 300; font-size: 0.875rem;">Hide City & Country Title</label>
              </div>
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="no-coords" style="width: auto; margin: 0;">
                <label for="no-coords" style="margin: 0; color: var(--text-secondary); cursor: pointer; text-transform: none; font-weight: 300; font-size: 0.875rem;">Hide Coordinates</label>
              </div>
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="show-buildings" style="width: auto; margin: 0;">
                <label for="show-buildings" style="margin: 0; color: var(--text-secondary); cursor: pointer; text-transform: none; font-weight: 300; font-size: 0.875rem;">Show Building Shadows</label>
              </div>
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="show-contours" style="width: auto; margin: 0;">
                <label for="show-contours" style="margin: 0; color: var(--text-secondary); cursor: pointer; text-transform: none; font-weight: 300; font-size: 0.875rem;">Show Topography</label>
              </div>
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="show-heart" style="width: auto; margin: 0;">
                <label for="show-heart" style="margin: 0; color: var(--text-secondary); cursor: pointer; text-transform: none; font-weight: 300; font-size: 0.875rem;">Show Heart at Center</label>
              </div>
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="gradient-tb" style="width: auto; margin: 0;">
                <label for="gradient-tb" style="margin: 0; color: var(--text-secondary); cursor: pointer; text-transform: none; font-weight: 300; font-size: 0.875rem;">Show Top/Bottom Gradient</label>
              </div>
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="gradient-lr" style="width: auto; margin: 0;">
                <label for="gradient-lr" style="margin: 0; color: var(--text-secondary); cursor: pointer; text-transform: none; font-weight: 300; font-size: 0.875rem;">Show Left/Right Gradient</label>
              </div>
            </div>

            <div class="form-group">
              <label for="text-position">Text Position</label>
              <div class="select-wrapper">
                <select id="text-position">
                  <option value="bottom">Bottom (default)</option>
                  <option value="top">Top</option>
                  <option value="center">Center</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn-generate" id="submit-btn">
              <span class="btn-text">Generate Masterpiece</span>
              <div class="spinner loader-hidden" id="loader"></div>
            </button>
          </form>
        </div>

        <!-- Preview Panel -->
        <div class="glass-panel preview-panel">
          <div class="preview-container" id="preview-container">
            <div class="preview-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="placeholder-icon"><path d="m2 22 5-5"/><path d="m14 2 5 5"/><path d="M11 7 4 14l2 2"/><path d="m13 13 4 4"/><path d="M8 8.5 15.5 16"/><path d="m18 16 4-4-2-2"/></svg>
              <p>Your creation will appear here.</p>
            </div>
            <img id="result-img" class="hidden" alt="Generated Poster" />
          </div>
          <div class="action-bar hidden" id="action-bar">
            <a id="download-btn" href="#" download="poster.png" class="btn-download">Download Result</a>
            <button id="copy-link-btn" class="btn-download" style="margin-left: 1rem; background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); cursor: pointer;">Copy Link to Image</button>
          </div>
        </div>
      </div>

      <footer class="app-footer">
        &copy; <span id="current-year"></span> Denys Rastiegaiev
      </footer>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
